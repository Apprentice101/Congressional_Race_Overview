name: Update News Well

on:
  schedule:
    # Runs every 6 hours (UTC). Edit the cron expression to change frequency.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch headlines
        run: python scripts/fetch_news.py

      - name: Commit and push if news.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "No news changes."
          else
            git commit -m "Update news well [automated]"
            git push
          fi
